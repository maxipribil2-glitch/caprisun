<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGALO GAMECENTER — Katapult Tower</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap" style="max-width:460px;">

  <div class="topbar">
    <div class="page-title" style="font-size:17px;"><span class="accent-dot" style="background:var(--am);"></span>Katapult Tower</div>
    <button class="ghost" id="leave-btn">Verlassen</button>
  </div>

  <div class="panel center">
    <div class="sub" id="names" style="margin-bottom:10px;">Lade Raum...</div>
    <canvas class="game-canvas" id="kat-canvas" width="360" height="420"></canvas>
    <div class="game-hud">
      <span id="turn-line">—</span>
    </div>
    <div id="status" style="margin-bottom:8px;">Ziehen, um zu zielen — nur wenn du dran bist.</div>
    <button id="rematch-btn" class="hidden">Rematch</button>
    <div class="hint">Ball am eigenen Katapult nach hinten ziehen &amp; loslassen. Hindernisse blocken (einmal treffbar), triff die Gegner-Figur zum Sieg.</div>
  </div>

</div>

<div class="map-sig">MAP</div>
<div class="version-tag">v2.0</div>

<style>.hidden{display:none;}</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="katapult.js"></script>
</body>
</html>
