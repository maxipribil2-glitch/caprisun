<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGALO GAMECENTER — Katapult Tower</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap" style="max-width:460px;">

  <div class="topbar">
    <div class="page-title" style="font-size:17px;"><span class="accent-dot" style="background:var(--am);"></span>Katapult Tower</div>
    <button class="ghost" id="leave-btn">Verlassen</button>
  </div>

  <div class="panel center">
    <div class="sub" style="margin-bottom:10px;">Zieh den Ball nach hinten und lass los, um den Turm umzuschießen 🎯</div>
    <canvas class="game-canvas" id="kat-canvas" width="360" height="420"></canvas>
    <div class="game-hud">
      <span id="shots">Schüsse übrig: 5</span>
      <span id="score">Blöcke umgehauen: 0</span>
    </div>
    <div id="status" style="margin-bottom:8px;"></div>
    <button id="restart-btn" class="hidden">Nochmal</button>
  </div>

  <div class="panel">
    <h2>🏆 Top 5</h2>
    <ul class="leaderboard" id="leaderboard"><li class="empty">Lade...</li></ul>
  </div>

</div>

<div class="map-sig">MAP</div>
<div class="version-tag">v1.0</div>

<style>.hidden{display:none;}</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="katapult.js"></script>
</body>
</html>
