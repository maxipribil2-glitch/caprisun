<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGALO GAMECENTER — Lobby</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="page-title"><span class="accent-dot"></span>Illegalo Gamecenter</div>
    <button class="ghost" id="logout-btn">Logout</button>
  </div>
  <div class="row topbar" style="margin-top:-18px;">
    <div class="who" id="who"></div>
    <div style="display:flex;gap:14px;">
      <a href="shop.html" class="hint" style="text-decoration:underline; cursor:pointer;">🏠 illegalo</a>
      <a href="gc-admin.html" class="hint" style="text-decoration:underline; cursor:pointer;">admin</a>
    </div>
  </div>

  <div class="panel hidden" id="waiting-banner"></div>

  <div class="panel">
    <h2>Retro Arcade — Solo</h2>
    <div class="arcade-grid" id="arcade-grid"></div>
  </div>

  <div class="panel">
    <h2>Spiel wählen</h2>
    <label for="game-select">Welches Spiel willst du vorschlagen?</label>
    <select id="game-select"></select>
  </div>

  <div class="panel">
    <h2>Online jetzt</h2>
    <ul class="player-list" id="player-list">
      <li class="empty">Lade...</li>
    </ul>
  </div>

  <div class="panel">
    <h2>Einladungen</h2>
    <div id="incoming-invites"><div class="empty">Lade...</div></div>
  </div>

</div>

<div class="map-sig">MAP</div>
<div class="version-tag">v1.2</div>

<style>.hidden{display:none;}</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="lobby.js"></script>
</body>
</html>
