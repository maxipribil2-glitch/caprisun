<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGALO GAMECENTER — Snake</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap" style="max-width:460px;">

  <div class="topbar">
    <div class="page-title" style="font-size:17px;"><span class="accent-dot" style="background:var(--gr);"></span>Snake</div>
    <button class="ghost" id="leave-btn">Verlassen</button>
  </div>

  <div class="panel center">
    <canvas class="game-canvas" id="snake-canvas" width="360" height="360"></canvas>
    <div class="game-hud">
      <span id="score">Score: 0</span>
      <span id="best">Dein Best: —</span>
    </div>
    <div id="status" style="margin-bottom:8px;"></div>
    <button id="restart-btn" class="hidden">Nochmal</button>

    <div class="dpad">
      <button class="dpad-btn dpad-up" data-dir="up">▲</button>
      <button class="dpad-btn dpad-left" data-dir="left">◀</button>
      <button class="dpad-btn dpad-down" data-dir="down">▼</button>
      <button class="dpad-btn dpad-right" data-dir="right">▶</button>
    </div>
    <div class="hint">Pfeiltasten / WASD oder das Pad oben benutzen.</div>
  </div>

  <div class="panel">
    <h2>🏆 Top 5</h2>
    <ul class="leaderboard" id="leaderboard"><li class="empty">Lade...</li></ul>
  </div>

</div>

<div class="map-sig">MAP</div>
<div class="version-tag">v1.0</div>

<style>.hidden{display:none;}</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="snake.js"></script>
</body>
</html>
