<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGALO GAMECENTER — Speed-Typing</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script>
(function(){ if(localStorage.getItem("illegalo_gc_theme")==="light") document.body.classList.add("gc-light"); })();
window.toggleGcTheme = function() {
  var isLight = document.body.classList.toggle("gc-light");
  localStorage.setItem("illegalo_gc_theme", isLight?"light":"dark");
  document.querySelectorAll(".gc-theme-btn").forEach(function(btn){ btn.textContent = isLight ? "🌙" : "☀️"; });
};
</script>
<div class="wrap" style="max-width:420px;">
  <div class="topbar">
    <div class="page-title" style="font-size:13px;"><span class="accent-dot" style="background:var(--bl);"></span>Speed-Typing</div>
    <button class="gc-theme-btn" id="gc-theme-btn" onclick="toggleGcTheme()" title="Dark/Light wechseln">☀️</button>
    <button class="ghost" id="leave-btn">Verlassen</button>
  </div>
  <div class="panel center">
    <div class="game-hud"><span id="timer">⏱️ 30s</span><span id="wpm">0 WPM</span></div>
    <div id="text-display" style="font-family:'VT323',monospace;font-size:18px;line-height:1.5;margin:14px 0;padding:10px;background:#1a1c26;border-radius:8px;text-align:left;"></div>
    <input id="type-input" autocomplete="off" placeholder="Hier tippen..." style="width:100%;box-sizing:border-box;font-size:16px;margin-bottom:8px;">
    <div id="status" style="margin-bottom:8px;"></div>
    <button id="restart-btn" class="hidden">Nochmal</button>
    <div class="hint">Tippe den Text so schnell und genau wie möglich ab. 30 Sekunden Zeit.</div>
  </div>
  <div class="panel"><h2>🏆 Top 5 (WPM)</h2><ul class="leaderboard" id="leaderboard"><li class="empty">Lade...</li></ul></div>
  <div class="shop-ad" id="shop-ad"></div>
</div>
<div class="map-sig">MAP</div>
<div class="version-tag">v1.0
<style>
.hidden{display:none;}
.typed-correct{color:#4ade80;}
.typed-wrong{color:#f87171;text-decoration:underline;}
.typed-pending{color:#6b7280;}
</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="coinBadge.js"></script>
<script type="module" src="typing.js"></script>
</body>
</html>
