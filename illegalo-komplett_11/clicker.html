<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGALO GAMECENTER — Coin Clicker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script>
(function(){ if(localStorage.getItem("illegalo_gc_theme")==="light") document.body.classList.add("gc-light"); })();
window.toggleGcTheme = function() {
  var isLight = document.body.classList.toggle("gc-light");
  localStorage.setItem("illegalo_gc_theme", isLight?"light":"dark");
  document.querySelectorAll(".gc-theme-btn").forEach(function(btn){ btn.textContent = isLight ? "🌙" : "☀️"; });
};
</script>
<div class="wrap" style="max-width:400px;">
  <div class="topbar">
    <div class="page-title" style="font-size:14px;"><span class="accent-dot" style="background:var(--am);"></span>Coin Clicker</div>
    <button class="gc-theme-btn" id="gc-theme-btn" onclick="toggleGcTheme()" title="Dark/Light wechseln">☀️</button>
    <button class="ghost" id="leave-btn">Verlassen</button>
  </div>
  <div class="panel center">
    <div id="big-coin" style="font-size:100px;cursor:pointer;user-select:none;margin:20px 0;">🪙</div>
    <div id="stats-row" style="margin-bottom:10px;">
      <div>Gesammelt diese Session: <strong id="session-count">0</strong></div>
      <div style="font-size:13px;color:var(--sub);">+<span id="per-click">1</span> pro Klick · +<span id="per-sec">0</span>/Sekunde (Auto)</div>
    </div>
    <div id="upgrades" style="display:flex;flex-direction:column;gap:8px;margin-top:10px;"></div>
    <div id="status" style="margin-top:10px;font-size:12px;color:var(--sub);"></div>
    <div class="hint">Klick den Coin, kauf Upgrades. Coins werden alle paar Sekunden real ins Konto eingezahlt (gecappt).</div>
  </div>
  <div class="shop-ad" id="shop-ad"></div>
</div>
<div class="map-sig">MAP</div>
<div class="version-tag">v1.0
<style>
.upgrade-btn{background:#2a2d3a;border:1.5px solid var(--bd);border-radius:8px;padding:8px 12px;color:var(--tx);cursor:pointer;text-align:left;font-size:13px;}
.upgrade-btn:disabled{opacity:.4;cursor:default;}
</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="coinBadge.js"></script>
<script type="module" src="clicker.js"></script>
</body>
</html>
