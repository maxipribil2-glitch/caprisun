<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGALO GAMECENTER — Wörterrätsel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script>
(function(){ if(localStorage.getItem("illegalo_gc_theme")==="light") document.body.classList.add("gc-light"); })();
window.toggleGcTheme = function() {
  var isLight = document.body.classList.toggle("gc-light");
  localStorage.setItem("illegalo_gc_theme", isLight?"light":"dark");
  document.querySelectorAll(".gc-theme-btn").forEach(function(btn){ btn.textContent = isLight ? "🌙" : "☀️"; });
};
</script>
<div class="wrap" style="max-width:400px;">
  <div class="topbar">
    <div class="page-title" style="font-size:14px;"><span class="accent-dot" style="background:var(--am);"></span>Wörterrätsel</div>
    <button class="gc-theme-btn" id="gc-theme-btn" onclick="toggleGcTheme()" title="Dark/Light wechseln">☀️</button>
    <button class="ghost" id="leave-btn">Verlassen</button>
  </div>
  <div class="panel center">
    <div id="wordle-grid" style="display:grid;grid-template-rows:repeat(6,1fr);gap:5px;max-width:280px;margin:0 auto 14px;"></div>
    <input id="word-input" maxlength="5" autocomplete="off" placeholder="5-Buchstaben-Wort" style="width:100%;box-sizing:border-box;font-size:18px;text-align:center;text-transform:uppercase;margin-bottom:8px;">
    <button id="submit-btn" style="width:100%;">Raten ✅</button>
    <div id="status" style="margin:10px 0;"></div>
    <button id="restart-btn" class="hidden">Nochmal</button>
    <div class="hint">6 Versuche. 🟩 = richtiger Buchstabe an richtiger Stelle, 🟨 = im Wort aber falsche Stelle.</div>
  </div>
  <div class="panel"><h2>🏆 Top 5 (wenigste Versuche)</h2><ul class="leaderboard" id="leaderboard"><li class="empty">Lade...</li></ul></div>
  <div class="shop-ad" id="shop-ad"></div>
</div>
<div class="map-sig">MAP</div>
<div class="version-tag">v1.0
<style>
.hidden{display:none;}
.wordle-row{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
.wordle-cell{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;border:2px solid #3a3f58;border-radius:4px;background:#1a1c26;color:#fff;}
.wordle-cell.correct{background:#15803d;border-color:#15803d;}
.wordle-cell.present{background:#b45309;border-color:#b45309;}
.wordle-cell.absent{background:#374151;border-color:#374151;}
</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="coinBadge.js"></script>
<script type="module" src="wordle.js"></script>
</body>
</html>
