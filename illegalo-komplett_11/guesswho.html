<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGALO GAMECENTER — Errate-Wer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script>
(function(){ if(localStorage.getItem("illegalo_gc_theme")==="light") document.body.classList.add("gc-light"); })();
window.toggleGcTheme = function() {
  var isLight = document.body.classList.toggle("gc-light");
  localStorage.setItem("illegalo_gc_theme", isLight?"light":"dark");
  document.querySelectorAll(".gc-theme-btn").forEach(function(btn){ btn.textContent = isLight ? "🌙" : "☀️"; });
};
</script>
<div class="wrap" style="max-width:440px;">
  <div class="topbar">
    <div class="page-title" style="font-size:14px;"><span class="accent-dot" style="background:var(--am);"></span>Errate-Wer</div>
    <button class="gc-theme-btn" id="gc-theme-btn" onclick="toggleGcTheme()" title="Dark/Light wechseln">☀️</button>
    <button class="ghost" id="leave-btn">Verlassen</button>
  </div>
  <div class="panel center">
    <div class="sub" id="names" style="margin-bottom:6px;">Lade Raum...</div>
    <div id="status" style="margin-bottom:10px;"></div>
    <div id="secret-box" style="font-size:15px;margin-bottom:12px;padding:10px;background:#1a1c26;border-radius:8px;display:none;"></div>
    <div id="guess-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;max-width:340px;margin:0 auto 14px;"></div>
    <button id="rematch-btn" class="hidden">Rematch</button>
    <div class="hint">Beide kriegen die gleiche Karten-Reihe. Rate, welche Karte dein Gegner sich gemerkt hat — schneller + richtig = Punkt.</div>
    <div class="reactions-row">
      <button class="reaction-btn" data-emoji="🔥">🔥</button>
      <button class="reaction-btn" data-emoji="😂">😂</button>
      <button class="reaction-btn" data-emoji="😡">😡</button>
      <button class="reaction-btn" data-emoji="👏">👏</button>
    </div>
  </div>
  <div id="match-chat" style="margin-top:14px;border:1.5px solid var(--bd);border-radius:6px;overflow:hidden;"><div id="chat-messages" style="height:90px;overflow-y:auto;padding:8px 10px;background:var(--bg);font-size:14px;display:flex;flex-direction:column;gap:4px;"></div><div style="display:flex;border-top:1.5px solid var(--bd);"><input id="chat-input" placeholder="Nachricht..." maxlength="80" style="flex:1;background:var(--s2);border:none;color:var(--tx);font-family:'VT323',monospace;font-size:16px;padding:7px 10px;outline:none;" onkeydown="if(event.key==='Enter')sendChat()"/><button onclick="sendChat()" style="background:var(--in);border:none;color:#fff;padding:7px 13px;font-family:'Press Start 2P',monospace;font-size:9px;cursor:pointer;">↵</button></div></div>
  <div class="shop-ad" id="shop-ad"></div>
</div>
<div id="reaction-popup" class="reaction-popup"></div>
<div class="map-sig">MAP</div>
<div class="version-tag">v1.0
<style>
.hidden{display:none;}
.gw-card{aspect-ratio:3/4;background:#2a2d3a;border:2px solid var(--bd);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;}
.gw-card.picked{border-color:#f59e0b;}
.gw-card.correct{background:#15803d;}
.gw-card.wrong{background:#7f1d1d;}
.gw-card.disabled{cursor:default;opacity:.7;}
</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="coinBadge.js"></script>
<script type="module" src="guesswho.js"></script>
</body>
</html>
