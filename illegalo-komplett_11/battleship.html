<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGALO GAMECENTER — Schiffe versenken</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script>
(function(){
  if(localStorage.getItem("illegalo_gc_theme")==="light") document.body.classList.add("gc-light");
})();
window.toggleGcTheme = function() {
  var isLight = document.body.classList.toggle("gc-light");
  localStorage.setItem("illegalo_gc_theme", isLight?"light":"dark");
  document.querySelectorAll(".gc-theme-btn").forEach(function(btn){
    btn.textContent = isLight ? "🌙" : "☀️";
  });
};
</script>
<div class="wrap" style="max-width:460px;">

  <div class="topbar">
    <div class="page-title" style="font-size:17px;"><span class="accent-dot" style="background:var(--bl);"></span>Schiffe versenken</div>
    <button class="gc-theme-btn" id="gc-theme-btn" onclick="toggleGcTheme()" title="Dark/Light wechseln">☀️</button>
    <button class="ghost" id="leave-btn">Verlassen</button>
  </div>

  <div class="panel center">
    <div class="sub" id="names" style="margin-bottom:6px;">Lade Raum...</div>
    <div id="status" style="margin-bottom:10px;"></div>

    <div id="setup-panel" class="hidden" style="margin-bottom:14px;">
      <div class="sub" style="margin-bottom:6px;">Platziere deine Schiffe (Klick = drehen, Ziehen = platzieren)</div>
      <div id="setup-grid" style="display:grid;grid-template-columns:repeat(10,1fr);gap:2px;max-width:320px;margin:0 auto;"></div>
      <div style="text-align:center;margin-top:10px;">
        <button id="randomize-btn" class="ghost" style="margin-right:6px;">🎲 Zufällig</button>
        <button id="ready-btn">Bereit ✅</button>
      </div>
    </div>

    <div id="battle-panel" class="hidden">
      <div class="sub" style="margin-bottom:4px;">Dein Feld</div>
      <div id="own-grid" style="display:grid;grid-template-columns:repeat(10,1fr);gap:2px;max-width:280px;margin:0 auto 14px;"></div>
      <div class="sub" style="margin-bottom:4px;">Gegner-Feld — hier schießen</div>
      <div id="enemy-grid" style="display:grid;grid-template-columns:repeat(10,1fr);gap:2px;max-width:280px;margin:0 auto;"></div>
    </div>

    <button id="rematch-btn" class="hidden">Rematch</button>
    <div class="hint">5 Schiffe (5,4,3,3,2 Felder). Klick aufs Gegner-Feld zum Schießen, wenn du dran bist.</div>
    <div class="reactions-row">
      <button class="reaction-btn" data-emoji="🔥">🔥</button>
      <button class="reaction-btn" data-emoji="😂">😂</button>
      <button class="reaction-btn" data-emoji="😡">😡</button>
      <button class="reaction-btn" data-emoji="👏">👏</button>
    </div>
  </div>

  <div id="match-chat" style="margin-top:14px;border:1.5px solid var(--bd);border-radius:6px;overflow:hidden;"><div id="chat-messages" style="height:90px;overflow-y:auto;padding:8px 10px;background:var(--bg);font-size:14px;display:flex;flex-direction:column;gap:4px;"></div><div style="display:flex;border-top:1.5px solid var(--bd);"><input id="chat-input" placeholder="Nachricht..." maxlength="80" style="flex:1;background:var(--s2);border:none;color:var(--tx);font-family:'VT323',monospace;font-size:16px;padding:7px 10px;outline:none;" onkeydown="if(event.key==='Enter')sendChat()"/><button onclick="sendChat()" style="background:var(--in);border:none;color:#fff;padding:7px 13px;font-family:'Press Start 2P',monospace;font-size:9px;cursor:pointer;">↵</button></div></div>

  <div class="shop-ad" id="shop-ad"></div>

</div>

<div id="reaction-popup" class="reaction-popup"></div>

<div class="map-sig">MAP</div>
<div class="version-tag">v1.0
<style>
.hidden{display:none;}
.bs-cell{aspect-ratio:1/1;background:#1a1c26;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;user-select:none;}
.bs-cell.ship{background:#3a3f58;}
.bs-cell.hit{background:#dc2626;color:#fff;}
.bs-cell.miss{background:#2a2d3a;color:#666;}
.bs-cell.sunk{background:#7f1d1d;color:#fff;}
</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="battleship.js"></script>
</body>
</html>
