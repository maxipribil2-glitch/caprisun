<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGALO GAMECENTER — Snake.io</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap" style="max-width:460px;">

  <div class="topbar">
    <div class="page-title" style="font-size:17px;"><span class="accent-dot" style="background:var(--pu);"></span>Snake.io</div>
    <button class="ghost" id="leave-btn">Verlassen</button>
  </div>

  <div class="panel center">
    <div class="sub" id="names" style="margin-bottom:10px;">Lade Raum...</div>
    <canvas class="game-canvas" id="game-canvas" width="360" height="360"></canvas>
    <div class="game-hud">
      <span id="score-line">—</span>
    </div>
    <div id="status" style="margin-bottom:8px;">...</div>
    <button id="rematch-btn" class="hidden">Rematch</button>

    <div class="dpad">
      <button class="dpad-btn dpad-up" data-dir="up">▲</button>
      <button class="dpad-btn dpad-left" data-dir="left">◀</button>
      <button class="dpad-btn dpad-down" data-dir="down">▼</button>
      <button class="dpad-btn dpad-right" data-dir="right">▶</button>
    </div>
    <div class="hint">Pfeiltasten / WASD oder das Pad oben benutzen.</div>
    <div class="reactions-row">
      <button class="reaction-btn" data-emoji="🔥">🔥</button>
      <button class="reaction-btn" data-emoji="😂">😂</button>
      <button class="reaction-btn" data-emoji="😡">😡</button>
      <button class="reaction-btn" data-emoji="👏">👏</button>
    </div>
  </div>

  <div class="shop-ad" id="shop-ad"></div>

</div>

<div id="reaction-popup" class="reaction-popup"></div>

<div class="map-sig">MAP</div>
<div class="version-tag">v1.4</div>

<style>.hidden{display:none;}</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="snakeio.js"></script>
</body>
</html>
