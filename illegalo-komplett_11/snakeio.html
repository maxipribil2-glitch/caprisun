<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGALO GAMECENTER — Snake.io</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script>
// MAP — GC Dark/Light persistenz, läuft synchron vor CSS render
(function(){
  if(localStorage.getItem("illegalo_gc_theme")==="light") document.body.classList.add("gc-light");
})();
window.toggleGcTheme = function() {
  var isLight = document.body.classList.toggle("gc-light");
  localStorage.setItem("illegalo_gc_theme", isLight?"light":"dark");
  document.querySelectorAll(".gc-theme-btn").forEach(function(btn){
    btn.textContent = isLight ? "🌙" : "☀️";
  });
};
</script>
<div class="wrap" style="max-width:460px;">

  <div class="topbar">
    <div class="page-title" style="font-size:17px;"><span class="accent-dot" style="background:var(--pu);"></span>Snake.io</div>
    <button class="gc-theme-btn" id="gc-theme-btn" onclick="toggleGcTheme()" title="Dark/Light wechseln">☀️</button>
    <button class="ghost" id="leave-btn">Verlassen</button>
  </div>

  <div class="panel center">
    <div class="sub" id="names" style="margin-bottom:10px;">Lade Raum...</div>
    <canvas class="game-canvas" id="game-canvas" width="360" height="360"></canvas>
    <div class="game-hud">
      <span id="score-line">—</span>
    </div>
    <div id="status" style="margin-bottom:8px;">...</div>
    <button id="rematch-btn" class="hidden">Rematch</button>

    <div class="dpad">
      <button class="dpad-btn dpad-up" data-dir="up">▲</button>
      <button class="dpad-btn dpad-left" data-dir="left">◀</button>
      <button class="dpad-btn dpad-down" data-dir="down">▼</button>
      <button class="dpad-btn dpad-right" data-dir="right">▶</button>
    </div>
    <div class="hint">Pfeiltasten / WASD oder das Pad oben benutzen.</div>
    <div class="reactions-row">
      <button class="reaction-btn" data-emoji="🔥">🔥</button>
      <button class="reaction-btn" data-emoji="😂">😂</button>
      <button class="reaction-btn" data-emoji="😡">😡</button>
      <button class="reaction-btn" data-emoji="👏">👏</button>
    </div>
  </div>

    <div id="match-chat" style="margin-top:14px;border:1.5px solid var(--bd);border-radius:6px;overflow:hidden;"><div id="chat-messages" style="height:90px;overflow-y:auto;padding:8px 10px;background:var(--bg);font-size:14px;display:flex;flex-direction:column;gap:4px;"></div><div style="display:flex;border-top:1.5px solid var(--bd);"><input id="chat-input" placeholder="Nachricht..." maxlength="80" style="flex:1;background:var(--s2);border:none;color:var(--tx);font-family:'VT323',monospace;font-size:16px;padding:7px 10px;outline:none;" onkeydown="if(event.key==='Enter')sendChat()"/><button onclick="sendChat()" style="background:var(--in);border:none;color:#fff;padding:7px 13px;font-family:'Press Start 2P',monospace;font-size:9px;cursor:pointer;">↵</button></div></div>

  <div class="shop-ad" id="shop-ad"></div>

</div>

<div id="reaction-popup" class="reaction-popup"></div>

<div class="map-sig">MAP</div>
<div class="version-tag">v1.6
<style>.hidden{display:none;}</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="coinBadge.js"></script>
<script type="module" src="snakeio.js"></script>
</body>
</html>
