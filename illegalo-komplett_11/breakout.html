<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGALO GAMECENTER — Breakout</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script>
// MAP — GC Dark/Light persistenz, läuft synchron vor CSS render
(function(){
  if(localStorage.getItem("illegalo_gc_theme")==="light") document.body.classList.add("gc-light");
})();
window.toggleGcTheme = function() {
  var isLight = document.body.classList.toggle("gc-light");
  localStorage.setItem("illegalo_gc_theme", isLight?"light":"dark");
  document.querySelectorAll(".gc-theme-btn").forEach(function(btn){
    btn.textContent = isLight ? "🌙" : "☀️";
  });
};
</script>
<div class="wrap" style="max-width:460px;">

  <div class="topbar">
    <div class="page-title" style="font-size:14px;"><span class="accent-dot" style="background:var(--re);"></span>Breakout</div>
    <button class="gc-theme-btn" id="gc-theme-btn" onclick="toggleGcTheme()" title="Dark/Light wechseln">☀️</button>
    <button class="ghost" id="leave-btn">Verlassen</button>
  </div>

  <div class="panel center">
    <canvas class="game-canvas" id="bo-canvas" width="360" height="420"></canvas>
    <div class="game-hud">
      <span id="score">Score: 0</span>
      <span id="lives">Leben: 3</span>
      <span id="best">Best: —</span>
    </div>
    <div id="status" style="margin-bottom:8px;"></div>
    <button id="restart-btn" class="hidden">Nochmal</button>
    <div class="dpad" style="grid-template-columns:64px 64px;grid-template-rows:54px;">
      <button class="dpad-btn" id="pad-left" style="grid-column:1;grid-row:1;">◀</button>
      <button class="dpad-btn" id="pad-right" style="grid-column:2;grid-row:1;">▶</button>
    </div>
    <div class="hint">Pfeiltasten ←/→ oder A/D — oder die Buttons gedrückt halten. Touch/Maus geht auch: einfach übers Spielfeld ziehen.</div>
  </div>

  <div class="panel">
    <h2>🏆 Top 5</h2>
    <ul class="leaderboard" id="leaderboard"><li class="empty">Lade...</li></ul>
  </div>

  <div class="shop-ad" id="shop-ad"></div>

</div>

<div style="position:fixed;bottom:56px;left:50%;transform:translateX(-50%);background:rgba(245,158,11,.9);color:#1a0a00;font-size:.75rem;font-weight:700;padding:5px 14px;border-radius:20px;z-index:999;display:none;" id="sw-offline-hint">📡 Offline — läuft aus dem Cache!</div>
<div class="map-sig">MAP</div>
<div class="version-tag">v1.4
<style>.hidden{display:none;}</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="breakout.js"></script>
<script>
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
window.addEventListener("offline", () => { const h = document.getElementById("sw-offline-hint"); if(h) h.style.display="block"; });
window.addEventListener("online", () => { const h = document.getElementById("sw-offline-hint"); if(h) h.style.display="none"; });
if (!navigator.onLine) { const h = document.getElementById("sw-offline-hint"); if(h) h.style.display="block"; }
</script>
</body>
</html>
