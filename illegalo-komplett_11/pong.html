<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGALO GAMECENTER — Pong</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap" style="max-width:460px;">

  <div class="topbar">
    <div class="page-title" style="font-size:14px;"><span class="accent-dot" style="background:var(--bl);"></span>Pong</div>
    <button class="ghost" id="leave-btn">Verlassen</button>
  </div>

  <div class="panel center">
    <div class="sub" id="names" style="margin-bottom:10px;">Lade Raum...</div>
    <canvas class="game-canvas" id="pong-canvas" width="360" height="240"></canvas>
    <div class="game-hud">
      <span id="score-line">0 — 0</span>
      <span id="status">Verbinde...</span>
    </div>
    <button id="rematch-btn" class="hidden">Rematch</button>
    <div class="dpad" style="grid-template-columns:64px;grid-template-rows:54px 54px;">
      <button class="dpad-btn" id="pad-up" style="grid-column:1;grid-row:1;">▲</button>
      <button class="dpad-btn" id="pad-down" style="grid-column:1;grid-row:2;">▼</button>
    </div>
    <div class="hint">Pfeiltasten ↑/↓ oder W/S — oder die Buttons gedrückt halten. Erster Punkt bis 5 gewinnt.</div>
    <div class="reactions-row">
      <button class="reaction-btn" data-emoji="🔥">🔥</button>
      <button class="reaction-btn" data-emoji="😂">😂</button>
      <button class="reaction-btn" data-emoji="😡">😡</button>
      <button class="reaction-btn" data-emoji="👏">👏</button>
    </div>
  </div>

  <div class="shop-ad" id="shop-ad"></div>

</div>

<div id="reaction-popup" class="reaction-popup"></div>

<div class="map-sig">MAP</div>
<div class="version-tag">v1.2</div>

<style>.hidden{display:none;}</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="pong.js"></script>
</body>
</html>
