<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGALO GAMECENTER — Trivia-Marathon</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script>
(function(){ if(localStorage.getItem("illegalo_gc_theme")==="light") document.body.classList.add("gc-light"); })();
window.toggleGcTheme = function() {
  var isLight = document.body.classList.toggle("gc-light");
  localStorage.setItem("illegalo_gc_theme", isLight?"light":"dark");
  document.querySelectorAll(".gc-theme-btn").forEach(function(btn){ btn.textContent = isLight ? "🌙" : "☀️"; });
};
</script>
<div class="wrap" style="max-width:420px;">
  <div class="topbar">
    <div class="page-title" style="font-size:14px;"><span class="accent-dot" style="background:var(--bl);"></span>Trivia-Marathon</div>
    <button class="gc-theme-btn" id="gc-theme-btn" onclick="toggleGcTheme()" title="Dark/Light wechseln">☀️</button>
    <button class="ghost" id="leave-btn">Verlassen</button>
  </div>
  <div class="panel center">
    <div class="game-hud"><span id="streak">🔥 Streak: 0</span><span id="lives">❤️❤️❤️</span></div>
    <div id="question-box" style="margin:16px 0;font-size:17px;min-height:70px;display:flex;align-items:center;justify-content:center;text-align:center;">Lädt...</div>
    <div id="answers" style="display:flex;flex-direction:column;gap:8px;"></div>
    <div id="status" style="margin-top:12px;"></div>
    <button id="restart-btn" class="hidden">Nochmal</button>
    <div class="hint">Jede richtige Antwort steigert den Schwierigkeitsgrad. 3 Leben — bei falscher Antwort is eins weg!</div>
  </div>
  <div class="panel"><h2>🏆 Top 5</h2><ul class="leaderboard" id="leaderboard"><li class="empty">Lade...</li></ul></div>
  <div class="shop-ad" id="shop-ad"></div>
</div>
<div class="map-sig">MAP</div>
<div class="version-tag">v1.0
<style>
.hidden{display:none;}
.trivia-answer-btn{width:100%;text-align:left;background:#1a1c26;border:1.5px solid var(--bd);color:var(--tx);}
.trivia-answer-btn.correct{background:var(--gr,#22c55e)!important;border-color:var(--gr,#22c55e)!important;color:#0a1408!important;}
.trivia-answer-btn.wrong{background:var(--re,#ef4444)!important;border-color:var(--re,#ef4444)!important;color:#fff!important;}
.trivia-answer-btn:disabled{cursor:default;opacity:.8;}
</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="coinBadge.js"></script>
<script type="module" src="trivia.js"></script>
</body>
</html>
