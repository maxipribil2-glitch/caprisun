<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGALO GAMECENTER — Sudoku</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script>
(function(){ if(localStorage.getItem("illegalo_gc_theme")==="light") document.body.classList.add("gc-light"); })();
window.toggleGcTheme = function() {
  var isLight = document.body.classList.toggle("gc-light");
  localStorage.setItem("illegalo_gc_theme", isLight?"light":"dark");
  document.querySelectorAll(".gc-theme-btn").forEach(function(btn){ btn.textContent = isLight ? "🌙" : "☀️"; });
};
</script>
<div class="wrap" style="max-width:420px;">
  <div class="topbar">
    <div class="page-title" style="font-size:16px;"><span class="accent-dot" style="background:var(--in);"></span>Sudoku</div>
    <button class="gc-theme-btn" id="gc-theme-btn" onclick="toggleGcTheme()" title="Dark/Light wechseln">☀️</button>
    <button class="ghost" id="leave-btn">Verlassen</button>
  </div>
  <div class="panel center">
    <div class="game-hud"><span id="timer">⏱️ 0s</span><span id="mistakes">❌ 0/3</span></div>
    <div id="sudoku-grid" style="display:grid;grid-template-columns:repeat(9,1fr);gap:0;max-width:340px;margin:10px auto;border:2px solid #1a1c26;"></div>
    <div id="number-pad" style="display:grid;grid-template-columns:repeat(9,1fr);gap:4px;max-width:340px;margin:0 auto 10px;"></div>
    <div id="status" style="margin-bottom:8px;">Zahl im Grid wählen, dann Ziffer eingeben</div>
    <button id="restart-btn" class="hidden">Nochmal</button>
    <div class="hint">Jede Zeile, Spalte und 3x3-Box muss 1-9 genau einmal enthalten. Max 3 Fehler.</div>
  </div>
  <div class="panel"><h2>🏆 Top 5</h2><ul class="leaderboard" id="leaderboard"><li class="empty">Lade...</li></ul></div>
  <div class="shop-ad" id="shop-ad"></div>
</div>
<div class="map-sig">MAP</div>
<div class="version-tag">v1.0
<style>
.hidden{display:none;}
.sudoku-cell{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;background:#1a1c26;color:#fff;cursor:pointer;border:1px solid #2a2d3a;}
.sudoku-cell.given{color:#94a3b8;cursor:default;}
.sudoku-cell.selected{background:#3a3f58;}
.sudoku-cell.wrong{color:#f87171;}
.num-btn{aspect-ratio:1/1;background:#3a3f58;color:#fff;border:none;border-radius:4px;font-size:14px;cursor:pointer;}
</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="coinBadge.js"></script>
<script type="module" src="sudoku.js"></script>
</body>
</html>
