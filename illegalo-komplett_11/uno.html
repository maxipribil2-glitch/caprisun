<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGALO GAMECENTER — UNO-Light</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script>
(function(){ if(localStorage.getItem("illegalo_gc_theme")==="light") document.body.classList.add("gc-light"); })();
window.toggleGcTheme = function() {
  var isLight = document.body.classList.toggle("gc-light");
  localStorage.setItem("illegalo_gc_theme", isLight?"light":"dark");
  document.querySelectorAll(".gc-theme-btn").forEach(function(btn){ btn.textContent = isLight ? "🌙" : "☀️"; });
};
</script>
<div class="wrap" style="max-width:460px;">
  <div class="topbar">
    <div class="page-title" style="font-size:14px;"><span class="accent-dot" style="background:var(--re);"></span>UNO-Light</div>
    <button class="gc-theme-btn" id="gc-theme-btn" onclick="toggleGcTheme()" title="Dark/Light wechseln">☀️</button>
    <button class="ghost" id="leave-btn">Verlassen</button>
  </div>
  <div class="panel center">
    <div class="sub" id="names" style="margin-bottom:6px;">Lade Raum...</div>
    <div id="status" style="margin-bottom:10px;"></div>
    <div style="display:flex;justify-content:center;gap:16px;align-items:center;margin:10px 0;">
      <div style="text-align:center;">
        <div style="font-size:11px;color:var(--sub,#888);margin-bottom:4px;">Nachziehstapel</div>
        <div id="draw-pile" class="uno-card back" onclick="window.__unoDraw && window.__unoDraw()">🎴</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:11px;color:var(--sub,#888);margin-bottom:4px;">Ablage</div>
        <div id="discard-top" class="uno-card"></div>
      </div>
    </div>
    <div id="opp-hand-count" style="text-align:center;margin:8px 0;font-size:13px;color:var(--sub,#888);"></div>
    <div id="my-hand" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:14px;"></div>
    <div id="color-picker" class="hidden" style="display:flex;gap:8px;justify-content:center;margin-top:12px;">
      <button class="uno-color-btn" style="background:#dc2626;" onclick="window.__unoPickColor('red')"></button>
      <button class="uno-color-btn" style="background:#eab308;" onclick="window.__unoPickColor('yellow')"></button>
      <button class="uno-color-btn" style="background:#22c55e;" onclick="window.__unoPickColor('green')"></button>
      <button class="uno-color-btn" style="background:#3b82f6;" onclick="window.__unoPickColor('blue')"></button>
    </div>
    <button id="rematch-btn" class="hidden">Rematch</button>
    <div class="hint">Farbe oder Zahl/Symbol muss passen. Skip/+2/Wild dabei — leg zuerst alle Karten ab!</div>
  </div>
  <div class="shop-ad" id="shop-ad"></div>
</div>
<div class="map-sig">MAP</div>
<div class="version-tag">v1.0
<style>
.hidden{display:none!important;}
.uno-card{width:52px;height:74px;border-radius:8px;background:#fff;color:#111;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;font-size:13px;font-weight:700;cursor:pointer;border:2px solid #222;box-shadow:0 2px 0 rgba(0,0,0,.3);}
.uno-card.back{background:linear-gradient(135deg,#1a1c26,#2a1538);color:var(--in);font-size:20px;}
.uno-card.red{background:#dc2626;color:#fff;}
.uno-card.yellow{background:#eab308;color:#1a1c26;}
.uno-card.green{background:#22c55e;color:#0a1408;}
.uno-card.blue{background:#3b82f6;color:#fff;}
.uno-card.wild{background:linear-gradient(135deg,#dc2626,#eab308,#22c55e,#3b82f6);color:#fff;}
.uno-card.unplayable{opacity:.35;cursor:default;}
.uno-color-btn{width:44px;height:44px;border-radius:50%;border:2px solid #fff;cursor:pointer;box-shadow:none;}
</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="coinBadge.js"></script>
<script type="module" src="uno.js"></script>
</body>
</html>
