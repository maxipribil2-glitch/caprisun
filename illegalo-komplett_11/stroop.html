<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGALO GAMECENTER — Farb-Reflex</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script>
(function(){ if(localStorage.getItem("illegalo_gc_theme")==="light") document.body.classList.add("gc-light"); })();
window.toggleGcTheme = function() {
  var isLight = document.body.classList.toggle("gc-light");
  localStorage.setItem("illegalo_gc_theme", isLight?"light":"dark");
  document.querySelectorAll(".gc-theme-btn").forEach(function(btn){ btn.textContent = isLight ? "🌙" : "☀️"; });
};
</script>
<div class="wrap" style="max-width:400px;">
  <div class="topbar">
    <div class="page-title" style="font-size:14px;"><span class="accent-dot" style="background:var(--in);"></span>Farb-Reflex</div>
    <button class="gc-theme-btn" id="gc-theme-btn" onclick="toggleGcTheme()" title="Dark/Light wechseln">☀️</button>
    <button class="ghost" id="leave-btn">Verlassen</button>
  </div>
  <div class="panel center">
    <div class="game-hud"><span id="timer">⏱️ 30s</span><span id="score">Richtig: 0</span></div>
    <div id="stroop-word" style="font-family:'Press Start 2P',monospace;font-size:34px;margin:26px 0;">—</div>
    <div id="color-btns" style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-width:280px;margin:0 auto 10px;"></div>
    <div id="status" style="margin-bottom:8px;">Tippen zum Starten</div>
    <button id="restart-btn" class="hidden">Nochmal</button>
    <div class="hint">Klick die FARBE in der das Wort geschrieben ist — nicht was das Wort sagt! (Stroop-Effekt)</div>
  </div>
  <div class="panel"><h2>🏆 Top 5</h2><ul class="leaderboard" id="leaderboard"><li class="empty">Lade...</li></ul></div>
  <div class="shop-ad" id="shop-ad"></div>
</div>
<div class="map-sig">MAP</div>
<div class="version-tag">v1.0
<style>
.hidden{display:none;}
.stroop-btn{padding:14px;border:none;border-radius:8px;font-family:'Press Start 2P',monospace;font-size:11px;color:#fff;cursor:pointer;}
</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="coinBadge.js"></script>
<script type="module" src="stroop.js"></script>
</body>
</html>
