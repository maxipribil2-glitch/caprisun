<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGALO GAMECENTER — Minesweeper</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script>
(function(){ if(localStorage.getItem("illegalo_gc_theme")==="light") document.body.classList.add("gc-light"); })();
window.toggleGcTheme = function() {
  var isLight = document.body.classList.toggle("gc-light");
  localStorage.setItem("illegalo_gc_theme", isLight?"light":"dark");
  document.querySelectorAll(".gc-theme-btn").forEach(function(btn){ btn.textContent = isLight ? "🌙" : "☀️"; });
};
</script>
<div class="wrap" style="max-width:420px;">

  <div class="topbar">
    <div class="page-title" style="font-size:16px;"><span class="accent-dot" style="background:var(--rd);"></span>Minesweeper</div>
    <button class="gc-theme-btn" id="gc-theme-btn" onclick="toggleGcTheme()" title="Dark/Light wechseln">☀️</button>
    <button class="ghost" id="leave-btn">Verlassen</button>
  </div>

  <div class="panel center">
    <div class="game-hud">
      <span id="timer">⏱️ 0s</span>
      <span id="mines-left">💣 10</span>
    </div>
    <div id="ms-grid" style="display:grid;grid-template-columns:repeat(9,1fr);gap:2px;max-width:340px;margin:0 auto;"></div>
    <div id="status" style="margin:10px 0;">Linksklick/Tap = aufdecken, Rechtsklick/Long-Press = Flagge</div>
    <button id="restart-btn">Neues Spiel</button>
    <div class="hint">9x9, 10 Minen. Je schneller geräumt desto mehr Coins (max 500).</div>
  </div>

  <div class="panel">
    <h2>🏆 Top 5 (schnellste Zeit)</h2>
    <ul class="leaderboard" id="leaderboard"><li class="empty">Lade...</li></ul>
  </div>

  <div class="shop-ad" id="shop-ad"></div>

</div>

<div class="map-sig">MAP</div>
<div class="version-tag">v1.0
<style>
.ms-cell{aspect-ratio:1/1;background:#3a3f58;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;cursor:pointer;user-select:none;}
.ms-cell.revealed{background:#1a1c26;}
.ms-cell.mine{background:#dc2626;}
.ms-cell.flag{background:#f59e0b;}
</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="coinBadge.js"></script>
<script type="module" src="minesweeper.js"></script>
</body>
</html>
