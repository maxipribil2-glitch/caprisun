<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGALO GAMECENTER — Anagramm-Rush</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script>
(function(){ if(localStorage.getItem("illegalo_gc_theme")==="light") document.body.classList.add("gc-light"); })();
window.toggleGcTheme = function() {
  var isLight = document.body.classList.toggle("gc-light");
  localStorage.setItem("illegalo_gc_theme", isLight?"light":"dark");
  document.querySelectorAll(".gc-theme-btn").forEach(function(btn){ btn.textContent = isLight ? "🌙" : "☀️"; });
};
</script>
<div class="wrap" style="max-width:420px;">
  <div class="topbar">
    <div class="page-title" style="font-size:14px;"><span class="accent-dot" style="background:var(--bl);"></span>Anagramm-Rush</div>
    <button class="gc-theme-btn" id="gc-theme-btn" onclick="toggleGcTheme()" title="Dark/Light wechseln">☀️</button>
    <button class="ghost" id="leave-btn">Verlassen</button>
  </div>
  <div class="panel center">
    <div class="game-hud"><span id="timer">⏱️ 60s</span><span id="score">Wörter: 0</span></div>
    <div id="letters-display" style="font-family:'Press Start 2P',monospace;font-size:28px;letter-spacing:6px;margin:16px 0;color:var(--am);"></div>
    <input id="word-input" placeholder="Wort eingeben..." autocomplete="off" style="width:100%;box-sizing:border-box;font-size:18px;text-align:center;margin-bottom:8px;">
    <button id="submit-btn" style="width:100%;">Absenden ✅</button>
    <div id="status" style="margin:10px 0;"></div>
    <button id="restart-btn" class="hidden">Nochmal</button>
    <div class="hint">Bilde so viele Wörter wie möglich aus den 7 Buchstaben, bevor die Zeit abläuft.</div>
  </div>
  <div class="panel"><h2>🏆 Top 5</h2><ul class="leaderboard" id="leaderboard"><li class="empty">Lade...</li></ul></div>
  <div class="shop-ad" id="shop-ad"></div>
</div>
<div class="map-sig">MAP</div>
<div class="version-tag">v1.0
<style>.hidden{display:none;}</style>
<script type="module" src="maintenance.js"></script>
<script type="module" src="coinBadge.js"></script>
<script type="module" src="anagramm.js"></script>
</body>
</html>
