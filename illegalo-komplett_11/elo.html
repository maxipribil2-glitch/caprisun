<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGALO GAMECENTER — Rangliste</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script>
// MAP — GC Dark/Light persistenz, läuft synchron vor CSS render
(function(){
  if(localStorage.getItem("illegalo_gc_theme")==="light") document.body.classList.add("gc-light");
})();
window.toggleGcTheme = function() {
  var isLight = document.body.classList.toggle("gc-light");
  localStorage.setItem("illegalo_gc_theme", isLight?"light":"dark");
  document.querySelectorAll(".gc-theme-btn").forEach(function(btn){
    btn.textContent = isLight ? "🌙" : "☀️";
  });
};
</script>
<div class="wrap" style="max-width:480px;">
  <div class="topbar">
    <div class="page-title" style="font-size:14px;"><span class="accent-dot" style="background:var(--am);"></span>Rangliste</div>
    <button class="gc-theme-btn" id="gc-theme-btn" onclick="toggleGcTheme()" title="Dark/Light wechseln">☀️</button>
    <button class="ghost" id="leave-btn">← Lobby</button>
  </div>

  <div class="panel">
    <h2>🏆 Gesamt-ELO</h2>
    <ul class="leaderboard" id="elo-overall"><li class="empty">Lade...</li></ul>
  </div>

  <div class="panel">
    <h2>🎮 Pro Spiel</h2>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;" id="game-tabs"></div>
    <ul class="leaderboard" id="elo-per-game"><li class="empty">Spiel wählen.</li></ul>
  </div>

  <div class="panel">
    <h2>📜 Letzte Matches</h2>
    <ul class="leaderboard" id="elo-recent"><li class="empty">Lade...</li></ul>
  </div>
</div>

<div class="map-sig">MAP</div>
<div class="version-tag">v1.2<script type="module" src="maintenance.js"></script>
<script type="module" src="elo.js"></script>
</body>
</html>
